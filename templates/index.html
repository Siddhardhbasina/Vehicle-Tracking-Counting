<!DOCTYPE html>
<html>
<head>
    <title>Email Spam Classifier</title>
</head>
<body>

    <h1>Email Spam Classifier</h1>

    <form action="/predict" method="POST">

        <textarea
            name="message"
            rows="10"
            cols="50"
            placeholder="Enter Email Text"
            required>
        </textarea>

        <br><br>

        <button type="submit">
            Check Email
        </button>

    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
